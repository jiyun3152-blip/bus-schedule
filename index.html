<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버스 시간표</title>
    <style>
        @import url('https://font.noonnu.cc/css/gryun');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'gryun', sans-serif;
            background-color: #f5f5f5;
        }
        
        .container {
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 700px;
            border: 2px solid #4C4C4C;
            border-radius: 20px;
            background-color: white;
        }
        
        h1 {
            color: #4C4C4C;
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        
        .search-section {
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        input, select {
            flex: 1;
            min-width: 150px;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #4C4C4C;
            border-radius: 8px;
            background-color: transparent;
            color: #4C4C4C;
            font-family: 'gryun', sans-serif;
        }
        
        input::placeholder {
            color: #999;
        }
        
        .autocomplete-list {
            position: absolute;
            background: white;
            border: 2px solid #4C4C4C;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            width: 200px;
            display: none;
            z-index: 10;
        }
        
        .autocomplete-list.active {
            display: block;
        }
        
        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
            text-align: left;
            color: #4C4C4C;
        }
        
        .autocomplete-item:hover {
            background-color: #f0f0f0;
        }
        
        .input-wrapper {
            position: relative;
            flex: 1;
            min-width: 150px;
        }
        
        button {
            padding: 12px 30px;
            font-size: 16px;
            border: 2px solid #4C4C4C;
            border-radius: 8px;
            background-color: transparent;
            color: #4C4C4C;
            cursor: pointer;
            font-weight: bold;
            font-family: 'gryun', sans-serif;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        button:hover {
            background-color: #4C4C4C;
            color: white;
        }
        
        .results {
            margin-top: 30px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .bus-item {
            border: 2px solid #4C4C4C;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: left;
        }
        
        .bus-time {
            font-size: 20px;
            color: #2563eb;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .bus-info {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
            line-height: 1.6;
        }
        
        .loading {
            text-align: center;
            color: #4C4C4C;
            font-size: 18px;
            margin: 20px 0;
        }
        
        .error {
            color: #dc2626;
            text-align: center;
            padding: 15px;
            border: 2px solid #dc2626;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .no-results {
            color: #999;
            text-align: center;
            padding: 30px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>버스 시간표</h1>
        
        <div class="search-section">
            <div class="input-group">
                <div class="input-row">
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="departure" 
                            placeholder="출발지 (예: 서울, 부산)" 
                            autocomplete="off"
                        >
                        <div id="departure-list" class="autocomplete-list"></div>
                    </div>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="arrival" 
                            placeholder="도착지 (예: 부산, 사상)" 
                            autocomplete="off"
                        >
                        <div id="arrival-list" class="autocomplete-list"></div>
                    </div>
                </div>
                <input 
                    type="date" 
                    id="travel-date"
                >
            </div>
            <button onclick="searchBuses()">검색</button>
        </div>
        
        <div id="results" class="results"></div>
    </div>

    <script>
        const API_KEY = 'dc148c3c07a3236f9b83c0f5a34e8e5dd24ceaa55e1d21f547f0ae6443c08f1a';
        let allTerminals = [];
        let departureTerminals = [];
        let arrivalTerminals = [];

        // 날짜 기본값 설정 (오늘)
        document.getElementById('travel-date').valueAsDate = new Date();

        // 터미널 목록 초기 로드
        async function loadTerminals() {
            try {
                const response = await fetch('/.netlify/functions/get-terminals', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: API_KEY })
                });
                
                const data = await response.json();
                if (data.terminals) {
                    allTerminals = data.terminals;
                }
            } catch (error) {
                console.log('터미널 로드 실패:', error);
            }
        }

        // 자동완성 필터링
        function filterTerminals(input, isList = 'departure') {
            const filtered = allTerminals.filter(t => 
                t.terminalName.includes(input) || t.terminalId.includes(input)
            );
            
            const listId = isList === 'departure' ? 'departure-list' : 'arrival-list';
            const listElement = document.getElementById(listId);
            
            if (input.length > 0 && filtered.length > 0) {
                listElement.innerHTML = filtered.slice(0, 8).map(t => 
                    `<div class="autocomplete-item" onclick="selectTerminal('${isList}', '${t.terminalId}', '${t.terminalName}')">${t.terminalName} (${t.terminalId})</div>`
                ).join('');
                listElement.classList.add('active');
            } else {
                listElement.classList.remove('active');
            }
        }

        // 터미널 선택
        function selectTerminal(type, terminalId, terminalName) {
            if (type === 'departure') {
                document.getElementById('departure').value = terminalName;
                document.getElementById('departure').dataset.terminalId = terminalId;
                document.getElementById('departure-list').classList.remove('active');
            } else {
                document.getElementById('arrival').value = terminalName;
                document.getElementById('arrival').dataset.terminalId = terminalId;
                document.getElementById('arrival-list').classList.remove('active');
            }
        }

        // 입력 이벤트 리스너
        document.getElementById('departure').addEventListener('input', (e) => {
            filterTerminals(e.target.value, 'departure');
        });

        document.getElementById('arrival').addEventListener('input', (e) => {
            filterTerminals(e.target.value, 'arrival');
        });

        // 검색
        async function searchBuses() {
            const departureInput = document.getElementById('departure');
            const arrivalInput = document.getElementById('arrival');
            const dateInput = document.getElementById('travel-date');
            const resultsDiv = document.getElementById('results');

            if (!departureInput.dataset.terminalId || !arrivalInput.dataset.terminalId || !dateInput.value) {
                resultsDiv.innerHTML = '<div class="error">출발지, 도착지, 날짜를 모두 선택해주세요.</div>';
                return;
            }

            resultsDiv.innerHTML = '<div class="loading">검색 중...</div>';

            try {
                const dateStr = dateInput.value.replace(/-/g, '');
                
                const response = await fetch('/.netlify/functions/search-buses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        depTerminalId: departureInput.dataset.terminalId,
                        arrTerminalId: arrivalInput.dataset.terminalId,
                        depPlanTime: dateStr,
                        apiKey: API_KEY
                    })
                });

                const data = await response.json();

                if (data.error) {
                    resultsDiv.innerHTML = `<div class="error">${data.error}</div>`;
                    return;
                }

                if (!data.buses || data.buses.length === 0) {
                    resultsDiv.innerHTML = '<div class="no-results">검색 결과가 없습니다.</div>';
                    return;
                }

                let html = '';
                data.buses.forEach(bus => {
                    html += `
                        <div class="bus-item">
                            <div class="bus-time">
                                ${bus.depPlandTime || '-'} → ${bus.arrPlandTime || '-'}
                            </div>
                            <div class="bus-info">
                                <div>요금: ${bus.charge || '-'}원</div>
                                <div>등급: ${bus.gradeNm || '-'}</div>
                                <div>출발: ${bus.depPlaceName || '-'}</div>
                                <div>도착: ${bus.arrPlaceName || '-'}</div>
                            </div>
                        </div>
                    `;
                });

                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">오류 발생: ${error.message}</div>`;
            }
        }

        // 초기 로드
        loadTerminals();
    </script>
</body>
</html>
